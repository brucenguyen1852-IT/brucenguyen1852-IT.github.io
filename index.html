<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VietDak Affiliate Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#EE4D2D;--primary-dark:#C0351A;--bg:#F8FAFC;--card:#FFFFFF;--text:#1E293B;--subtext:#64748B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:40px 16px}
.container{max-width:520px;margin:0 auto}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:8px}
.header p{color:var(--subtext);font-size:15px}
.stats-badge{display:inline-block;background:#FFEFEA;color:var(--primary);padding:6px 16px;border-radius:100px;font-weight:700;font-size:13px;margin-bottom:24px}
.card{background:var(--card);border-radius:24px;padding:32px;box-shadow:0 10px 25px rgba(0,0,0,0.05);border:1px solid #E2E8F0}
.input-group{margin-bottom:20px}
.label{display:block;font-weight:700;font-size:14px;margin-bottom:8px;color:var(--text)}
.input-box{display:flex;background:#F1F5F9;border:2px solid #E2E8F0;border-radius:16px;overflow:hidden;transition:0.3s}
.input-box:focus-within{border-color:var(--primary);background:#FFF}
.input-box input{flex:1;padding:16px;border:none;outline:none;background:transparent;font-size:15px;font-family:inherit}
.btn-paste{padding:0 16px;background:none;border:none;cursor:pointer;font-size:20px}
.btn-convert{width:100%;padding:16px;background:var(--primary);color:#FFF;border:none;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;transition:0.3s;box-shadow:0 4px 12px rgba(238,77,45,0.25)}
.btn-convert:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-convert:disabled{background:#CBD5E1;box-shadow:none;cursor:not-allowed}
#result-area{display:none;margin-top:24px;padding-top:24px;border-top:1px dashed #E2E8F0}
.result-box{display:flex;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:12px;padding:12px;gap:12px;align-items:center}
.result-box input{flex:1;background:none;border:none;outline:none;color:#166534;font-weight:600;font-size:14px}
.btn-copy{padding:8px 20px;background:#16A34A;color:#FFF;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.error{display:none;color:#DC2626;background:#FEF2F2;padding:12px;border-radius:12px;font-size:13px;font-weight:600;margin-top:12px;text-align:center}
.social-section{margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.social-card{background:#FFF;padding:20px;border-radius:20px;text-align:center;border:1px solid #E2E8F0;text-decoration:none;transition:0.3s}
.social-card:hover{border-color:var(--primary);transform:translateY(-3px)}
.social-card.fb{border-bottom:4px solid #1877F2}
.social-card.zalo{border-bottom:4px solid #0068FF}
.social-card img{width:100px;height:100px;margin-top:10px;border-radius:8px}
.social-card span{display:block;font-weight:700;font-size:14px;color:var(--text)}
.footer{text-align:center;margin-top:40px;color:var(--subtext);font-size:12px;font-weight:600}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="stats-badge">🚀 Đã giúp tạo <span id="convert-count">0</span> link thành công</div>
        <h1>Shopee Convert</h1>
        <p>Hệ thống tự động gắn mã Affiliate VietDak</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label class="label">Nhập link Shopee của bạn</label>
            <div class="input-box">
                <input type="text" id="link" placeholder="Dán link sản phẩm hoặc link rút gọn..." autocomplete="off">
                <button class="btn-paste" onclick="doPaste()">📋</button>
            </div>
        </div>
        
        <button class="btn-convert" id="go-btn" onclick="convert()">Bắt đầu chuyển đổi</button>
        <div id="err" class="error"></div>

        <div id="result-area">
            <label class="label">Link đã gắn mã thành công:</label>
            <div class="result-box">
                <input type="text" id="result" readonly>
                <button class="btn-copy" id="copy-btn" onclick="doCopy()">Copy</button>
            </div>
        </div>
    </div>

    <div class="social-section">
        <a href="https://www.facebook.com/groups/1731832854456702/" target="_blank" class="social-card fb">
            <span>Group Facebook</span>
            <small style="color:#1877F2">Tham gia hỗ trợ</small>
        </a>
        <div class="social-card zalo">
            <span>Group Zalo</span>
            <a href="https://zalo.me/g/svdjxc658" target="_blank" style="text-decoration:none;font-size:12px;color:#0068FF;display:block;margin-bottom:5px">Vào Nhóm Zalo</a>
            <img src="zalo-qr.jpg" alt="Zalo QR">
        </div>
    </div>

    <div class="footer">VIETDAK SYSTEM &copy; 2026</div>
</div>

<script>
var AFF_ID = "17306040278";
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRXwdYx-wzNwLkeij2gMLOPI5anJWHFSfARQbtvWJDKp0DfiVC7Yr97trihOOKjC_X/exec";

async function init(){
    try{
        const r = await fetch(SCRIPT_URL+"?short_url=check");
        const d = await r.json();
        document.getElementById("convert-count").innerText = d.total_conversions;
    }catch(e){}
}
init();

function build(link){
    let s="", i="";
    let m1 = link.match(/product\/(\d+)\/(\d+)/);
    let m2 = link.match(/-i\.(\d+)\.(\d+)/);
    let m3 = link.match(/\/(\d+)\/(\d+)(?:\?|$)/);
    if(m1){s=m1[1]; i=m1[2]}
    else if(m2){s=m2[1]; i=m2[2]}
    else if(m3){s=m3[1]; i=m3[2]}
    
    if(s && i){
        let o = "https://shopee.vn/product/"+s+"/"+i;
        return "https://s.shopee.vn/an_redir?origin_link="+o+"&affiliate_id="+AFF_ID+"&sub_id=githubtool";
    }
    return null;
}

async function convert(){
    let val = document.getElementById("link").value.trim();
    if(!val) return;
    
    let btn = document.getElementById("go-btn");
    let err = document.getElementById("err");
    let resArea = document.getElementById("result-area");
    
    btn.disabled = true;
    btn.innerText = "Đang xử lý dữ liệu...";
    err.style.display = "none";
    resArea.style.display = "none";

    let final = "";
    let isShort = val.includes("shp.ee") || val.includes("s.shopee.vn") || (!val.includes("product/") && !val.includes("-i."));

    if(isShort && !val.includes("an_redir")){
        try{
            const r = await fetch(SCRIPT_URL+"?short_url="+encodeURIComponent(val));
            const d = await r.json();
            document.getElementById("convert-count").innerText = d.total_conversions;
            final = build(d.long_url);
        }catch(e){ alert("Lỗi kết nối máy chủ!") }
    } else if(val.includes("an_redir")){
        final = val;
    } else {
        final = build(val);
        if(final) fetch(SCRIPT_URL+"?short_url=count_only");
    }

    if(final){
        document.getElementById("result").value = final;
        resArea.style.display = "block";
        doCopy();
    } else {
        err.style.display = "block";
        err.innerText = "⚠️ Link không hợp lệ hoặc không tìm thấy sản phẩm.";
    }
    btn.disabled = false;
    btn.innerText = "Bắt đầu chuyển đổi";
}

function doCopy(){
    let i = document.getElementById("result");
    i.select();
    navigator.clipboard.writeText(i.value);
    let b = document.getElementById("copy-btn");
    b.innerText = "Xong!";
    setTimeout(()=>{b.innerText="Copy"}, 2000);
}

async function doPaste(){
    try{
        document.getElementById("link").value = await navigator.clipboard.readText();
    }catch(e){}
}
</script>
</body>
</html>
